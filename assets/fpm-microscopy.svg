<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Fourier ptychographic microscopy abstract visual</title>
  <desc id="desc">Abstract microscope field with LED-array rings and computational reconstruction patterns.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#06101f"/><stop offset="1" stop-color="#101d34"/></linearGradient>
    <linearGradient id="line" x1="0" x2="1"><stop stop-color="#38d5ff"/><stop offset="1" stop-color="#f1d48f"/></linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="9"/></filter>
  </defs>
  <rect width="1200" height="760" rx="48" fill="url(#bg)"/>
  <circle cx="602" cy="380" r="250" fill="#38d5ff" opacity=".08" filter="url(#blur)"/>
  <g transform="translate(600 380)" fill="none" stroke="url(#line)" stroke-width="4" opacity=".85">
    <circle r="70"/><circle r="135"/><circle r="205"/><circle r="275"/>
  </g>
  <g fill="#f7fbff" opacity=".92">
    <circle cx="600" cy="380" r="8"/>
    <circle cx="710" cy="380" r="7"/><circle cx="490" cy="380" r="7"/><circle cx="600" cy="270" r="7"/><circle cx="600" cy="490" r="7"/>
    <circle cx="735" cy="515" r="7"/><circle cx="465" cy="245" r="7"/><circle cx="735" cy="245" r="7"/><circle cx="465" cy="515" r="7"/>
  </g>
  <g stroke="#38d5ff" stroke-width="3" stroke-opacity=".58">
    <path d="M600 380L710 380M600 380L490 380M600 380L600 270M600 380L600 490M600 380L735 515M600 380L465 245M600 380L735 245M600 380L465 515"/>
  </g>
  <g opacity=".65">
    <rect x="96" y="120" width="230" height="520" rx="28" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.18)"/>
    <path d="M160 570h110M174 504h82M198 162v250" stroke="#f1d48f" stroke-width="8" stroke-linecap="round"/>
    <circle cx="198" cy="438" r="64" fill="none" stroke="#38d5ff" stroke-width="8"/>
  </g>
  <g fill="#f7fbff" font-family="Inter, Arial, sans-serif">
    <text x="78" y="72" font-size="28" font-weight="800" opacity=".9">Fourier Ptychographic Microscopy</text>
    <text x="78" y="700" font-size="20" opacity=".62">LED geometry · calibration · reconstruction</text>
  </g>
</svg>
