<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Blood-smear computational imaging visual</title>
  <desc id="desc">Abstract blood-smear field with circular cell forms and microscopy-inspired contrast.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#081421"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <radialGradient id="cell" cx="50%" cy="48%" r="50%"><stop offset="0" stop-color="#07111f" stop-opacity=".2"/><stop offset=".56" stop-color="#f1d48f" stop-opacity=".32"/><stop offset="1" stop-color="#38d5ff" stop-opacity=".58"/></radialGradient>
  </defs>
  <rect width="1200" height="760" rx="48" fill="url(#bg)"/>
  <g opacity=".86">
    <circle cx="212" cy="244" r="70" fill="url(#cell)" stroke="#38d5ff" stroke-opacity=".35" stroke-width="4"/>
    <circle cx="396" cy="330" r="88" fill="url(#cell)" stroke="#f1d48f" stroke-opacity=".3" stroke-width="4"/>
    <circle cx="612" cy="238" r="76" fill="url(#cell)" stroke="#38d5ff" stroke-opacity=".33" stroke-width="4"/>
    <circle cx="824" cy="386" r="92" fill="url(#cell)" stroke="#f1d48f" stroke-opacity=".32" stroke-width="4"/>
    <circle cx="1010" cy="246" r="62" fill="url(#cell)" stroke="#38d5ff" stroke-opacity=".3" stroke-width="4"/>
    <circle cx="268" cy="548" r="86" fill="url(#cell)" stroke="#f1d48f" stroke-opacity=".3" stroke-width="4"/>
    <circle cx="550" cy="548" r="68" fill="url(#cell)" stroke="#38d5ff" stroke-opacity=".3" stroke-width="4"/>
    <circle cx="984" cy="570" r="80" fill="url(#cell)" stroke="#f1d48f" stroke-opacity=".34" stroke-width="4"/>
  </g>
  <g stroke="#ffffff" stroke-opacity=".08" stroke-width="1">
    <path d="M0 160h1200M0 320h1200M0 480h1200M0 640h1200M200 0v760M400 0v760M600 0v760M800 0v760M1000 0v760"/>
  </g>
  <path d="M90 650C210 560 340 672 470 584c118-80 230-48 340 8 118 60 218 50 306-48" fill="none" stroke="#38d5ff" stroke-opacity=".28" stroke-width="6"/>
  <text x="78" y="72" fill="#f7fbff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Blood-smear Imaging</text>
  <text x="78" y="700" fill="#f7fbff" fill-opacity=".62" font-family="Inter, Arial, sans-serif" font-size="20">microscopy · reconstruction · cell morphology</text>
