<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1040" role="img" aria-labelledby="title desc"><title id="title">When Systems Fail cover</title><desc id="desc">Stylized cover card for the published book When Systems Fail.</desc><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#020812"/></linearGradient></defs><rect width="720" height="1040" rx="34" fill="url(#bg)"/><g stroke="#f7fbff" stroke-opacity=".18" stroke-width="5" fill="none"><path d="M80 220h260q40 0 40 40v120q0 40 40 40h220"/><path d="M80 500h180q40 0 40 40v190q0 40-40 40H90"/><path d="M410 160v220M520 160v520M635 210v580"/></g><circle cx="380" cy="420" r="12" fill="#ff7a1a"/><text x="70" y="220" fill="#f7fbff" font-family="Inter, Arial, sans-serif" font-size="86" font-weight="900">WHEN</text><text x="70" y="330" fill="#f7fbff" font-family="Inter, Arial, sans-serif" font-size="86" font-weight="900">SYSTEMS</text><text x="70" y="460" fill="#ff7a1a" font-family="Inter, Arial, sans-serif" font-size="116" font-weight="900">FAIL</text><text x="70" y="820" fill="#f7fbff" fill-opacity=".76" font-family="Inter, Arial, sans-serif" font-size="28">Why so many public crises are</text><text x="70" y="860" fill="#f7fbff" fill-opacity=".76" font-family="Inter, Arial, sans-serif" font-size="28">the same failure happening again</text><text x="70" y="960" fill="#f7fbff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Eyasu Desalegne Beyene</text></svg>